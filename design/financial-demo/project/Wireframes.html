<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Finance App · Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; overflow: hidden; }
  body { font-family: Roboto, system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="wf-primitives.jsx"></script>
<script type="text/babel" src="wf-dashboards.jsx"></script>
<script type="text/babel" src="wf-screens.jsx"></script>

<script type="text/babel">
const PHONE_W = 412;
const PHONE_H = 892;
const FRAME_W = PHONE_W + 12; // some breathing room for the focus ring etc.
const FRAME_H = PHONE_H + 12;

// Thin wrapper: an Android frame inside a DCArtboard.
function Phone({ children }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: '#F4F1ED',
    }}>
      <AndroidDevice width={PHONE_W} height={PHONE_H}>
        {children}
      </AndroidDevice>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      {/* Intro post-it explaining the system */}
      <DCSection
        id="intro"
        title="Финансовое приложение · вайрфреймы"
        subtitle="Material 3 · мобильное (Android) + веб · мульти-валюта · семейный бюджет"
      >
        <DCArtboard id="legend" label="Дизайн-система" width={520} height={460}>
          <div style={{ padding: 32, fontFamily: 'Roboto, system-ui, sans-serif', color: '#1F1D1B', height: '100%', boxSizing: 'border-box', overflow: 'hidden' }}>
            <div style={{ fontSize: 11, color: '#6E6B66', fontFamily: 'JetBrains Mono, monospace', letterSpacing: 0.5, textTransform: 'uppercase' }}>Wireframe system</div>
            <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: -0.3, marginTop: 4, marginBottom: 16 }}>
              Чистые блоки · одна акцентная пара
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, fontSize: 12 }}>
              <div>
                <div style={{ fontWeight: 600, marginBottom: 8 }}>Палитра</div>
                {[
                  ['#006A60', 'Primary · teal'],
                  ['#CDE8E1', 'Primary soft'],
                  ['#E07A4A', 'Goals · warm'],
                  ['#FBE4D6', 'Goals soft'],
                  ['#3D8C5E', 'Positive'],
                  ['#E8E6E2', 'Placeholder'],
                ].map(([c, n]) => (
                  <div key={c} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <div style={{ width: 18, height: 18, borderRadius: 4, background: c, border: '1px solid rgba(0,0,0,0.05)' }} />
                    <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10 }}>{c}</div>
                    <div style={{ color: '#6E6B66' }}>{n}</div>
                  </div>
                ))}
              </div>
              <div>
                <div style={{ fontWeight: 600, marginBottom: 8 }}>Типографика</div>
                <div style={{ fontSize: 24, fontWeight: 600, letterSpacing: -0.4, lineHeight: 1.1 }}>Roboto</div>
                <div style={{ fontSize: 11, color: '#6E6B66', fontFamily: 'JetBrains Mono, monospace', marginBottom: 12 }}>UI · 11–28px</div>
                <div style={{ fontSize: 13, fontFamily: 'JetBrains Mono, monospace' }}>JetBrains Mono</div>
                <div style={{ fontSize: 11, color: '#6E6B66', fontFamily: 'JetBrains Mono, monospace', marginBottom: 12 }}>annotations · 9–11px</div>

                <div style={{ fontWeight: 600, marginTop: 10, marginBottom: 8 }}>Принципы</div>
                <ul style={{ paddingLeft: 16, margin: 0, color: '#1F1D1B', lineHeight: 1.5 }}>
                  <li>Серошкальные блоки = плейсхолдеры</li>
                  <li>Цвет — только семантика (action / state)</li>
                  <li>Material 3 · Bottom nav, FAB, chips</li>
                  <li>Скруглённость карточек 16–20px</li>
                </ul>
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      {/* 4 dashboard variations */}
      <DCSection
        id="dashboards"
        title="Дашборд · 4 варианта"
        subtitle="Главный экран. Варьируется layout, фокус виза vs цифры, иерархия и плотность"
      >
        <DCArtboard id="v1" label="V1 · Баланс‑герой" width={FRAME_W} height={FRAME_H}>
          <Phone><DashV1 /></Phone>
        </DCArtboard>
        <DCArtboard id="v2" label="V2 · Графики на первом плане" width={FRAME_W} height={FRAME_H}>
          <Phone><DashV2 /></Phone>
        </DCArtboard>
        <DCArtboard id="v3" label="V3 · Цели вперёд" width={FRAME_W} height={FRAME_H}>
          <Phone><DashV3 /></Phone>
        </DCArtboard>
        <DCArtboard id="v4" label="V4 · Плотная аналитика" width={FRAME_W} height={FRAME_H}>
          <Phone><DashV4 /></Phone>
        </DCArtboard>
      </DCSection>

      {/* Supporting screens */}
      <DCSection
        id="add"
        title="Добавление траты"
        subtitle="Быстрый ввод — нумпад, чипы категорий, выбор счёта"
      >
        <DCArtboard id="add-1" label="Numpad-flow" width={FRAME_W} height={FRAME_H}>
          <Phone><AddExpenseScreen /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="txns"
        title="История транзакций"
        subtitle="Поиск, фильтры, группировка по дате"
      >
        <DCArtboard id="txns-1" label="Список с днями" width={FRAME_W} height={FRAME_H}>
          <Phone><TransactionsScreen /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="analytics"
        title="Аналитика и графики"
        subtitle="Donut по категориям · тренд · сравнение доход/расход"
      >
        <DCArtboard id="an-1" label="Месячный отчёт" width={FRAME_W} height={FRAME_H}>
          <Phone><AnalyticsScreen /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="goals"
        title="Копилки и цели"
        subtitle="Мотивационный экран накоплений с прогрессом и сроками"
      >
        <DCArtboard id="g-1" label="Список целей" width={FRAME_W} height={FRAME_H}>
          <Phone><GoalsScreen /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="budget"
        title="Бюджет на месяц"
        subtitle="Общий лимит + лимиты по категориям, с превышениями"
      >
        <DCArtboard id="b-1" label="Лимиты по категориям" width={FRAME_W} height={FRAME_H}>
          <Phone><BudgetScreen /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="accounts"
        title="Счета и карты"
        subtitle="Карты, наличные, вклады, инвестиции — все источники денег"
      >
        <DCArtboard id="a-1" label="Стек карт" width={FRAME_W} height={FRAME_H}>
          <Phone><AccountsScreen /></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="settings"
        title="Настройки и профиль"
        subtitle="Семейный бюджет, валюты, импорт, уведомления"
      >
        <DCArtboard id="s-1" label="Профиль" width={FRAME_W} height={FRAME_H}>
          <Phone><SettingsScreen /></Phone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
