# Production deploy on the home server.
# Reuses the existing Postgres on the shared "edge" network (host "postgres").
# Pull image:  docker compose pull && docker compose up -d
services:
  finance:
    image: ${FINANCE_IMAGE:-ghcr.io/CHANGE_ME/finance-app:latest}
    container_name: finance
    restart: unless-stopped
    env_file: .env
    networks:
      - edge
    extra_hosts:
      # lets LEMONADE_BASE_URL=http://host.docker.internal:<port> reach the host
      - "host.docker.internal:host-gateway"
      # so the container can reach ZITADEL's tailnet issuer for OIDC discovery/token
      - "desktop-8pn4dpm.tail8f5bb5.ts.net:100.72.210.71"
    ports:
      # localhost only; exposed via tailscale serve. Host port = APP_PORT (default 8002;
      # 8001 is taken by the kitchen app). Expose with:
      #   tailscale serve --bg --https=${APP_PORT} http://127.0.0.1:${APP_PORT}
      - "127.0.0.1:${APP_PORT:-8002}:3000"

networks:
  edge:
    external: true
